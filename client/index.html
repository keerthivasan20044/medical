<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a1628" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>MediPharm - Your Medicine, Delivered in Minutes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script>
      (function () {
        var host = location.hostname;
        if (host === 'localhost' || host === '127.0.0.1') {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              regs.forEach(function (reg) { reg.unregister(); });
            }).catch(function () {});
          }
          if ('caches' in window) {
            caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (key) { return caches.delete(key); }));
            }).catch(function () {});
          }
        }
      })();
    </script>
  </head>
  <body class="bg-white text-brand-navy font-body">
    <div id="root"></div>
    
    <!-- Diagnostic Rescue Node -->
    <div id="no-js-rescue" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #0a1628; color: white; font-family: sans-serif; text-align: center; padding: 20px;">
        <div style="font-size: 40px; margin-bottom: 20px;">🛰️</div>
        <h2 style="font-size: 20px; font-weight: 800; letter-spacing: 0.1em; color: #02C39A;">CONNECTION ERROR</h2>
        <p style="opacity: 0.5; max-width: 300px; line-height: 1.6;">The MediPharm app failed to load. Please check your internet connection and try again.</p>
        <div style="margin-top: 20px; font-size: 10px; color: #ff4d4d;" id="error-log"></div>
    </div>

    <script>
      // If root gets content, hide the rescue node
      const observer = new MutationObserver(function(mutations) {
        if (document.getElementById('root').innerHTML.length > 0) {
          document.getElementById('no-js-rescue').style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
      
      // Global error logger for debugging
      window.onerror = function(msg, url, line) {
        document.getElementById('error-log').innerText = "FATAL: " + msg + " @ " + line;
      };
      
      // Check for bundle load failure after 10s
      setTimeout(() => {
        if (document.getElementById('root').innerHTML.length === 0) {
            document.getElementById('error-log').innerText += " (App loading timeout)";
        }
      }, 10000);
    </script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
