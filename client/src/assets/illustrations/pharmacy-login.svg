<svg width="600" height="800" viewBox="0 0 600 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="55%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#028090"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#02C39A"/>
      <stop offset="100%" stop-color="#028090"/>
    </linearGradient>
    <filter id="blur" x="-40" y="-40" width="680" height="880" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="600" height="800" rx="32" fill="url(#bg)"/>

  <circle cx="120" cy="140" r="90" fill="#02C39A" fill-opacity="0.12"/>
  <circle cx="520" cy="190" r="140" fill="#02C39A" fill-opacity="0.1"/>
  <circle cx="420" cy="640" r="120" fill="#02C39A" fill-opacity="0.08"/>

  <g filter="url(#blur)">
    <rect x="110" y="220" width="380" height="320" rx="28" fill="#0F223A" fill-opacity="0.6"/>
  </g>

  <rect x="150" y="260" width="300" height="240" rx="24" fill="#ffffff" fill-opacity="0.06" stroke="#02C39A" stroke-opacity="0.35"/>

  <rect x="220" y="310" width="160" height="80" rx="40" fill="url(#pill)"/>
  <rect x="300" y="310" width="80" height="80" rx="40" fill="#ffffff" fill-opacity="0.18"/>
  <rect x="250" y="330" width="20" height="40" rx="10" fill="#ffffff"/>
  <rect x="270" y="350" width="40" height="20" rx="10" fill="#ffffff"/>

  <rect x="190" y="430" width="220" height="16" rx="8" fill="#ffffff" fill-opacity="0.4"/>
  <rect x="220" y="460" width="160" height="10" rx="5" fill="#ffffff" fill-opacity="0.25"/>

  <circle cx="120" cy="650" r="28" fill="#ffffff" fill-opacity="0.2"/>
  <circle cx="520" cy="620" r="18" fill="#ffffff" fill-opacity="0.18"/>
</svg>
